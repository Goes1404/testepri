  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

h1 style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:600; color:#1B1326; margin:0;\">Nota de corte<\u002Fh1>\n        <\u002Fdiv>\n        <p style=\"font-size:13px; color:#6E6680; margin:0 0 16px 52px; line-height:1.45;\">A nota está subindo ou caindo? Veja a tendência dos últimos anos.<\u002Fp>\n\n        <div style=\"display:flex; gap:8px; overflow-x:auto; margin:0 -20px 16px; padding:0 20px 4px;\">\n          <sc-for list=\"{{ ncPicker }}\" as=\"p\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ p.on }}\" style=\"{{ p.st }}\">{{ p.sigla }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"background:rgba(255,255,255,.68); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,.7); border-radius:22px; padding:20px; box-shadow:0 10px 28px rgba(75,45,163,.09); margin-bottom:18px;\">\n          <div style=\"font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:600; color:#1B1326;\">{{ ncSel.curso }}<\u002Fdiv>\n          <div style=\"font-size:12px; color:#6E6680; margin:2px 0 18px;\">{{ ncSel.uni }} · {{ ncSel.programa }}<\u002Fdiv>\n\n          <!-- gráfico -->\n          <div style=\"position:relative; display:flex; align-items:flex-end; justify-content:space-between; gap:14px; height:150px;\">\n            <div style=\"position:absolute; left:0; right:0; top:{{ minhaW }}; border-top:1.5px dashed #C25BA0; z-index:2;\"><span style=\"position:absolute; right:0; top:-9px; font-size:9px; font-weight:700; color:#C25BA0; background:#fff; padding:0 4px;\">você {{ minhaNota }}<\u002Fspan><\u002Fdiv>\n            <sc-for list=\"{{ ncBars }}\" as=\"t\" hint-placeholder-count=\"4\">\n              <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; gap:7px;\">\n                <div style=\"font-family:'Space Grotesk',sans-serif; font-size:12px; font-weight:700; color:#4B2DA3;\" ween; gap:9px; border:1.5px solid #E3DCF5; background:rgba(255,255,255,.7); color:#4B2DA3; font-family:'Sora',sans-serif; font-weight:600; font-size:13px; padding:14px 16px; border-radius:16px; cursor:pointer;\" style-active=\"transform:scale(.99)\">\n            <span style=\"text-align:left; line-height:1.3;\">Não tem holerite?<br><span style=\"font-size:11px; font-weight:500; color:#A89FBA;\">Gere sua declaração de renda aqui<\u002Fspan><\u002Fspan>\n            <svg width=\"8\" height=\"14\" viewBox=\"0 0 8 14\"><path d=\"M1 1l6 6-6 6\" stroke=\"#7B4FE0\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ════════════ COTA + RECORRÊNCIA ════════════ -->\n      <sc-if value=\"{{ recorrenciaOn }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Recorrência\" style=\"padding:6px 20px 32px;\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin:2px 0 6px;\">\n          <button onclick=\"{{ goBack }}\" style=\"flex:none; width:40px; height:40px; border:none; border-radius:13px; background:rgba(255,255,255,.6); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); box-shadow:0 4px 14px rgba(75,45,163,.1); display:flex; align-items:center; justify-content:center; cursor:pointer;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#4B2DA3\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n          <h1 style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:600; color:#1B1326; margin:0;\">Manter minha bolsa<\u002Fh1>\n        <\u002Fdiv>\n        <p style=\"font-size:13px; color:#6E6680; margin:0 0 18px 52px; line-height:1.45;\">Ganhar a bolsa é só o começo. A cada semestre você precisa comprovar — e a gente te lembra.<\u002F t-size:14px; font-weight:600; color:#fff;\">{{ r.label }}<\u002Fdiv>\n                    <div style=\"display:flex; gap:5px; margin-top:4px; flex-wrap:wrap;\">\n                      <sc-for list=\"{{ r.progs }}\" as=\"pg\" hint-placeholder-count=\"2\">\n                        <span style=\"font-size:10px; font-weight:600; color:#C9B6F5; background:rgba(255,255,255,.12); padding:3px 8px; border-radius:6px;\">{{ pg }}<\u002Fspan>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <button onclick=\"{{ goBusca }}\" style=\"width:100%; border:none; cursor:pointer; background:linear-gradient(135deg,#C25BA0,#8A2E6E); color:#fff; font-family:'Sora',sans-serif; font-weight:600; font-size:14px; padding:15px; border-radius:16px; box-shadow:0 10px 22px rgba(138,46,110,.24);\" style-active=\"transform:scale(.99)\">Ver bolsas nesses cursos<\u002Fbutton>\n            <button onclick=\"{{ vocReset }}\" style=\"width:100%; border:1.5px solid #E3DCF5; cursor:pointer; background:rgba(255,255,255,.7); color:#4B2DA3; font-family:'Sora',sans-serif; font-weight:600; font-size:13px; padding:13px; border-radius:16px;\" style-active=\"transform:scale(.99)\">Refazer o teste<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ vocNotFinal }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"background:rgba(255,255,255,.68); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,.7); border-radius:24px; padding:22px 20px; box-shadow:0 10px 28px rgba(75,45,163,.09);\">\n            <div style=\"font-family:'Space Grotesk',sans-serif; font-size:17px; font-weight:600; color:#1B1326; line-height:1.35; margin-bottom:18px;\">{{ vocPergAtual.q }}<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:10px;\">\n              <sc-for list=\"{{ vocOps }}\" as=\"o\" hint-placeholder-count=\"4\">\n                <button onclick=\"{{ o.on }}\" style=\"width:100%; text-align:left; border:1.5px solid #E7E0F4; background:rgba(255,255,255,.8); border-radius:16px; padding:14px 16px; cursor:pointer; font-family:'Space Grotesk',sans-serif; font-size:13.5px; font-weight:500; color:#1B1326; line-height:1.35;\" style-active=\"transform:scale(.99)\">{{ o.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ════════════ DECLARAÇÃO PRÓPRIO PUNHO ════════════ -->\n      <sc-if value=\"{{ declaracaoOn }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Declaração\" style=\"padding:6px 20px 32px;\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin:2px 0 6px;\">\n          <button onclick=\"{{ goBack }}\" style=\"flex:none; width:40px; height:40px; border:none; border-radius:13px; background:rgba(255,255,255,.6); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); box-shadow:0 4px 14px rgba(75,45,163,.1); display:flex; align-items:center; justify-content:center; cursor:pointer;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#4B2DA3\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n          <h1 style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:600; color:#1B1326; margin:0;\">Declaração de renda<\u002Fh1>\n        <\u002Fdiv>\n        <p style=\"font-size:13px; color:#6E6680; margin:0 0 18px 52px; line-height:1.45;\">Sem holerite? Gere sua declaração de próprio punho para o ProUni.<\u002Fp>\n\n        <div style=\"background:rgba(255,255,255,.68); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,.7); border-radius:22px; padding:20px; box-shadow:0 10px 28px rgba(75,45,163,.09); margin-bottom:16px;\">\n          <div style=\"display:flex; flex-direction:column; gap:14px;\">\n            <div><label style=\"font-size:12px; font-weight:600; color:#4B2DA3; display:block; margin-bottom:5px;\">Nome completo<\u002Flabel><input type=\"text\" value=\"{{ declNome }}\" oninput=\"{{ setDeclNome }}\" placeholder=\"Ex.: Maria da Silva Santos\" style=\"width:100%; border:1.5px solid #E3DCF5; border-radius:12px; padding:11px 14px; font-size:13.5px; color:#1B1326; background:rgba(255,255,255,.9); font-family:'Sora',sans-serif; box-sizing:border-box;\"><\u002Fdiv>\n            <div><label style=\"font-size:12px; font-weight:600; color:#4B2DA3; display:block; margin-bottom:5px;\">CPF<\u002Flabel><input type=\"text\" value=\"{{ declCpf }}\" oninput=\"{{ setDeclCpf }}\" placeholder=\"000.000.000-00\" style=\"width:100%; border:1.5px solid #E3DCF5; border-radius:12px; padding:11px 14px; font-size:13.5px; color:#1B1326; background:rgba(255,255,255,.9); font-family:'Sora',sans-serif; box-sizing:border-box;\"><\u002Fdiv>\n            <div><label style=\"font-size:12px; font-weight:600; color:#4B2DA3; display:block; margin-bottom:5px;\">Endereço completo<\u002Flabel><input type=\"text\" value=\"{{ declEnder }}\" oninput=\"{{ setDeclEnder }}\" placeholder=\"Rua, número, bairro, cidade/UF\" style=\"width:100%; border:1.5px solid #E3DCF5; border-radius:12px; padding:11px 14px; font-size:13.5px; color:#1B1326; background:rgba(255,255,255,.9); font-family:'Sora',sans-serif; box-sizing:border-box;\"><\u002Fdiv>\n            <div><label style=\"font-size:12px; font-weight:600; color:#4B2DA3; display:block; margin-bottom:5px;\">Ocupação / como ganha renda<\u002Flabel><input type=\"text\" value=\"{{ declOcup }}\" oninput=\"{{ setDeclOcup }}\" placeholder=\"Ex.: diarista, vendedor(a) autônomo(a)\" style=\"width:100%; border:1.5px solid #E3DCF5; border-radius:12px; padding:11px 14px; font-size:13.5px; color:#1B1326; background:rgba(255,255,255,.9); font-family:'Sora',sans-serif; box-sizing:border-box;\"><\u002Fdiv>\n            <div style=\"display:flex; gap:12px;\">\n              <div style=\"flex:1;\"><label style=\"font-size:12px; font-weight:600; color:#4B2DA3; display:block; margin-bottom:5px;\">Renda mensal (R$)<\u002Flabel><input type=\"number\" value=\"{{ declRenda }}\" oninput=\"{{ setDeclRenda }}\" placeholder=\"1200\" style=\"width:100%; border:1.5px solid #E3DCF5; border-radius:12px; padding:11px 14px; font-size:13.5px; color:#1B1326; background:rgba(255,255,255,.9); font-family:'Sora',sans-serif; box-sizing:border-box;\"><\u002Fdiv>\n              <div style=\"flex:1;\"><label style=\"font-size:12px; font-weight:600; color:#4B2DA3; display:block; margin-bottom:5px;\">Pessoas na casa<\u002Flabel><input type=\"number\" value=\"{{ declFamil }}\" oninput=\"{{ setDeclFamil }}\" min=\"1\" max=\"12\" placeholder=\"1\" style=\"width:100%; border:1.5px solid #E3DCF5; border-radius:12px; padding:11px 14px; font-size:13.5px; color:#1B1326; background:rgba(255,255,255,.9); font-family:'Sora',sans-serif; box-sizing:border-box;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ declPronta }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex; gap:11px; margin-bottom:16px;\">\n            <div style=\"flex:1; background:rgba(255,255,255,.65); border:1px solid rgba(255,255,255,.7); border-radius:18px; padding:14px 15px;\">\n              <div style=\"font-size:11px; color:#A89FBA; font-weight:600;\">Renda per capita<\u002Fdiv>\n              <div style=\"font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:700; color:#1B1326; margin-top:4px;\">{{ declRpc }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1; background:rgba(255,255,255,.65); border:1px solid rgba(255,255,255,.7); border-radius:18px; padding:14px 15px;\">\n              <div style=\"font-size:11px; color:#A89FBA; font-weight:600;\">Elegível ProUni?<\u002Fdiv>\n              <div style=\"font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:700; margin-top:5px; color:#23A06B;\">Sim ✓<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff; border:1.5px solid #E3DCF5; border-radius:18px; padding:20px; margin-bottom:14px; font-family:Georgia,serif;\">\n            <div style=\"text-align:center; font-size:14px; font-weight:700; color:#1B1326; margin-bottom:12px; text-transform:uppercase; letter-spacing:.5px;\">Declaração de Renda<\u002Fdiv>\n            <p style=\"font-size:12.5px; color:#2A2040; line-height:1.7; margin:0;\">Eu, <b>{{ declNome }}<\u002Fb>, portador(a) do CPF <b>{{ declCpf }}<\u002Fb>, residente em <b>{{ declEnder }}<\u002Fb>, declaro, para os devidos fins de habilitação ao ProUni, que exerço a atividade de <b>{{ declOcup }}<\u002Fb>, auferindo renda mensal de aproximadamente <b>{{ declRendaFmt }}<\u002Fb>. A renda per capita familiar é de <b>{{ declRpc }}<\u002Fb>, considerando {{ declFamil }} pessoa(s) no grupo familiar. Declaro que as informações são verdadeiras e assumo total responsabilidade civil e criminal pelo seu conteúdo.<\u002Fp>\n            <p style=\"font-size:12px; color:#6E6680; margin:16px 0 0; text-align:right;\">{{ declData }}<\u002Fp>\n            <div style=\"margin-top:22px; border-top:1px solid #E3DCF5; padding-top:14px; text-align:center;\"><div style=\"display:inline-block; width:180px; border-bottom:1px solid #1B1326; margin-bottom:5px;\"><\u002Fdiv><div style=\"font-size:11px; color:#6E6680;\">Assinatura do declarante<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:flex-start; gap:10px; background:rgba(35,160,107,.09); border:1px solid rgba(35,160,107,.24); border-radius:14px; padding:13px 14px; margin-bottom:16px;\">\n            <svg width=\"15\" height=\"15\" style=\"flex:none; margin-top:1px;\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#23A06B\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 8v4M12 16h.01\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-size:12px; color:#147A4F; line-height:1.45;\">Imprima e assine à mão. Leve junto com 1 documento com foto no dia da comprovação.<\u002Fspan>\n          <\u002Fdiv>\n          <button onclick=\"{{ printDecl }}\" style=\"width:100%; border:none; cursor:pointer; background:linear-gradient(135deg,#6B3FD0,#4B2DA3); color:#fff; font-family:'Sora',sans-serif; font-weight:600; font-size:14px; padding:15px; border-radius:16px; display:flex; align-items:center; justify-content:center; gap:10px; box-shadow:0 10px 22px rgba(75,45,163,.22);\" style-active=\"transform:scale(.99)\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"6 9 6 2 18 2 18 9\"><\u002Fpolyline><path d=\"M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2\"><\u002Fpath><rect x=\"6\" y=\"14\" width=\"12\" height=\"8\"><\u002Frect><\u002Fsvg>Salvar / Imprimir declaração<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ════════════ CHECKLIST PÓS-APROVAÇÃO ════════════ -->\n      <sc-if value=\"{{ checklistOn }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Checklist\" style=\"padding:6px 20px 32px;\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin:2px 0 6px;\">\n          <button onclick=\"{{ goBack }}\" style=\"flex:none; width:40px; height:40px; border:none; border-radius:13px; background:rgba(255,255,255,.6); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); box-shadow:0 4px 14px rgba(75,45,163,.1); display:flex; align-items:center; justify-content:center; cursor:pointer;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#4B2DA3\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n          <h1 style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:600; color:#1B1326; margin:0;\">Fui aprovado! E agora?<\u002Fh1>\n        <\u002Fdiv>\n        <p style=\"font-size:13px; color:#6E6680; margin:0 0 18px 52px; line-height:1.45;\">Siga cada passo para não perder sua bolsa na matrícula.<\u002Fp>\n\n        <div style=\"display:flex; align-items:center; gap:6px; margin-bottom:6px;\">\n          <sc-for list=\"{{ ckDots }}\" as=\"d\" hint-placeholder-count=\"6\"><div style=\"{{ d.st }}\"><\u002Fdiv><\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;\">\n          <span style=\"font-size:11px; font-weight:600; color:#8A7BB0;\">Passo {{ ckPct === 100 ? ckTotal : Math.floor(ckPct/100*ckTotal)+1 }} de {{ ckTotal }}<\u002Fspan>\n          <span style=\"font-family:'Space Grotesk',sans-serif; font-size:13px; font-weight:700; color:#23A06B;\">{{ ckPct }}% concluído<\u002Fspan>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ ckFinal }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:linear-gradient(150deg,#23A06B,#147A4F); border-radius:24px; padding:28px 22px; text-align:center; box-shadow:0 14px 32px rgba(20,122,79,.28);\">\n            <div style=\"width:60px; height:60px; margin:0 auto 14px; border-radius:50%; background:rgba(255,255,255,.18); display:flex; align-items:center; justify-content:center;\"><svg width=\"32\" height=\"32\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:700; color:#fff; margin-bottom:8px;\">Tudo certo!<\u002Fdiv>\n            <p style=\"font-size:13px; color:#BFEAD6; line-height:1.5; margin:0 0 18px;\">Você completou todos os passos da matrícula. Boa sorte no primeiro dia de aula!<\u002Fp>\n            <button onclick=\"{{ checklistReset }}\" style=\"border:none; cursor:pointer; background:rgba(255,255,255,.2); color:#fff; font-family:'Sora',sans-serif; font-weight:600; font-size:13px; padding:11px 22px; border-radius:13px;\">Recomeçar checklist<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ ckNotFinal }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"background:rgba(255,255,255,.68); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,.7); border-radius:24px; padding:22px; box-shadow:0 10px 28px rgba(75,45,163,.09); margin-bottom:18px;\">\n            <div style=\"display:flex; align-items:center; gap:11px; margin-bottom:14px;\">\n              <div style=\"flex:none; width:42px; height:42px; border-radius:13px; background:linear-gradient(135deg,#23A06B,#147A4F); display:flex; align-items:center; justify-content:center;\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 11l3 3L22 4\"><\u002Fpath><path d=\"M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <div style=\"flex:1;\">\n                <div style=\"font-size:10px; font-weight:700; color:#8A7BB0; text-transform:uppercase; letter-spacing:.5px;\">{{ ckAtual.prazo }}<\u002Fdiv>\n                <div style=\"font-family:'Space Grotesk',sans-serif; font-size:15.5px; font-weight:600; color:#1B1326; line-height:1.3; margin-top:2px;\">{{ ckAtual.titulo }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <p style=\"font-size:13.5px; color:#5A5270; line-height:1.55; margin:0;\">{{ ckAtual.desc }}<\u002Fp>\n          <\u002Fdiv>\n          <button onclick=\"{{ checklistNext }}\" style=\"width:100%; border:none; cursor:pointer; background:linear-gradient(135deg,#23A06B,#147A4F); color:#fff; font-family:'Sora',sans-serif; font-weight:600; font-size:14px; padding:15px; border-radius:16px; box-shadow:0 10px 22px rgba(20,122,79,.24);\" style-active=\"transform:scale(.99)\">Concluído — próximo passo<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ════════════ ALERTA DE VAGA ════════════ -->\n      <sc-if value=\"{{ alertaVagaOn }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Alerta de Vaga\" style=\"padding:6px 20px 32px;\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin:2px 0 6px;\">\n          <button onclick=\"{{ goBack }}\" style=\"flex:none; width:40px; height:40px; border:none; border-radius:13px; background:rgba(255,255,255,.6); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); box-shadow:0 4px 14px rgba(75,45,163,.1); display:flex; align-items:center; justify-content:center; cursor:pointer;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#4B2DA3\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n          <div style=\"flex:1;\">\n            <h1 style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:600; color:#1B1326; margin:0;\">Alertas de vaga<\u002Fh1>\n            <div style=\"font-size:12px; color:#8A7BB0; margin-top:1px;\">{{ alertaVagaStr }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:13px; color:#6E6680; margin:0 0 18px; line-height:1.45;\">Te avisamos assim que uma nova chamada abrir para as bolsas ativadas.<\u002Fp>\n\n        <div style=\"display:flex; flex-direction:column; gap:11px;\">\n          <sc-for list=\"{{ alertaBolsas }}\" as=\"b\" hint-placeholder-count=\"5\">\n idaturas<\u002Fh1>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; flex-direction:column; gap:16px;\">\n          <sc-for list=\"{{ acompCands }}\" as=\"c\" hint-placeholder-count=\"2\">\n            <div style=\"background:rgba(255,255,255,.68); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,.7); border-radius:22px; padding:18px; box-shadow:0 10px 28px rgba(75,45,163,.1);\">\n\n              <!-- bolsa info -->\n              <div style=\"display:flex; gap:12px; align-items:center; margin-bottom:16px;\">\n                <div style=\"width:44px; height:44px; border-radius:13px; flex:none; background:linear-gradient(135deg,#ECE6FB,#D8CBF6); display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px; color:#4B2DA3;\">{{ c.sigla }}<\u002Fdiv>\n                <div style=\"flex:1; min-width:0;\"><div style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14.5px; color:#1B1326; line-height:1.2;\">{{ c.curso }}<\u002Fdiv><div style=\"font-size:12px; color:#6E6680; margin-top:2px;\">{{ c.uni }} · {{ c.pct }} de bolsa<\u002Fdiv><\u002Fdiv>\n                <span style=\"font-size:11.5px; font-weight:600; color:#4B2DA3; background:#EDE7FA; padding:5px 11px; border-radius:999px; white-space:nowrap;\">{{ c.statusLabel }}<\u002Fspan>\n              <\u002Fdiv>\n\n              <!-- pipeline visual -->\n              <div style=\"display:flex; align-items:flex-start; gap:0; overflow-x:auto; padding-bottom:4px; margin-bottom:14px;\">\n                <sc-for list=\"{{ c.steps }}\" as=\"s\" hint-placeholder-count=\"6\">\n                  <div style=\"display:flex; flex-direction:column; align-items:center; flex:1; min-width:40px;\">\n                    <div style=\"display:flex; align-items:center; width:100%;\">\n                      <div style=\"flex:1; height:3px; background: {{ s.lineBg }};\"><\u002Fdiv>\n if; font-weight:600; font-size:12px; padding:12px; border-radius:13px;\" style-active=\"transform:scale(.98)\">Recorrer<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ════════════ ALERTA DE VAGAS ════════════ -->\n      <sc-if value=\"{{ alertaOn }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Alertas\" style=\"padding:6px 20px 32px;\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin:2px 0 6px;\">\n          <button onclick=\"{{ goBack }}\" style=\"flex:none; width:40px; height:40px; border:none; border-radius:13px; background:rgba(255,255,255,.6); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); box-shadow:0 4px 14px rgba(75,45,163,.1); display:flex; align-items:center; justify-content:center; cursor:pointer;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#4B2DA3\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n          <h1 style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:600; color:#1B1326; margin:0;\">Alertas de vagas<\u002Fh1>\n        <\u002Fdiv>\n        <p style=\"font-size:13px; color:#6E6680; margin:0 0 20px 52px; line-height:1.45;\">A IA monitora e te avisa quando uma bolsa combina com você.<\u002Fp>\n\n        <!-- alertas -->\n        <div style=\"display:flex; flex-direction:column; gap:12px; margin-bottom:22px;\">\n          <sc-for list=\"{{ alertaFmt }}\" as=\"a\" hint-placeholder-count=\"2\">\n            <div style=\"background:rgba(255,255,255,.68); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,.7); border-radius:20px; padding:17px 18px; box-shadow:0 8px 22px rgba(75,45,163,.08);\">\n              <div style=\"display:flex; align-items:flex-start; gap:13px;\">\n                <div style=\"width:44px; height:44px; flex:none; border-radius:13px; background:linear-gradient(135deg,#7B4FE0,#4B2DA3); display:flex; align-items:center; justify-content:center;\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9\"><\u002Fpath><path d=\"M13.7 21a2 2 0 0 1-3.4 0\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                <div style=\"flex:1; min-width:0;\">\n                  <div style=\"font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:600; color:#1B1326; margin-bottom:5px;\">{{ a.curso }}<\u002Fdiv>\n                  <div style=\"display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px;\">\n                    <span style=\"font-size:11.5px; font-weight:500; color:#5B3FA0; background:#F1ECFB; padding:4px 9px; border-radius:8px;\">{{ a.cidadeLabel }}<\u002Fspan>\n                    <span style=\"font-size:11.5px; font-weight:500; color:#5B3FA0; background:#F1ECFB; padding:4px 9px; border-radius:8px;\">{{ a.minPctLabel }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font-size:11px; color:#A89FBA;\">Última verificação: {{ a.lastCheck }}<\u002Fdiv>\n                <\u002Fdiv>\n                <button onclick=\"{{ a.toggle }}\" style=\"{{ a.trackSt }}\"><span style=\"{{ a.knobSt }}\"><\u002Fspan><\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"margin-top:12px; padding-top:12px; border-top:1px solid #F2EEFA; display:flex; align-items:center; justify-content:space-between;\">\n                <span style=\"font-size:12px; font-weight:600; color: {{ a.statusColor }};\">● {{ a.statusLabel }}<\u002Fspan>\n                <span style=\"font-size:12px; color:#A89FBA;\">Monitorando 24h por dia<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- novo alerta -->\n        <button style=\"width:100%; display:flex; align-items:center; justify-content:center; gap:8px; border:2px dashed #C4BAD6; background:transparent; color:#7B4FE0; font-family:'Sora',sans-serif; font-weight:600; font-size:14px; padding:16px; border-radius:18px; cursor:pointer;\" style-active=\"transform:scale(.98)\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>Criar novo alerta\n        <\u002Fbutton>\n\n        <!-- como funciona -->\n        <div style=\"margin-top:20px; background:rgba(138,92,240,.08); border:1px solid rgba(138,92,240,.2); border-radius:16px; padding:16px 18px;\">\n          <div style=\"font-size:12px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; color:#7B4FE0; margin-bottom:10px;\">Como funciona<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:9px;\">\n            <div style=\"display:flex; gap:10px; align-items:flex-start;\"><span style=\"width:20px; height:20px; flex:none; border-radius:6px; background:#7B4FE0; color:#fff; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center;\">1<\u002Fspan><span style=\"font-size:12.5px; color:#3A3450; line-height:1.4;\">Você define curso, cidade e % mínimo de bolsa<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; gap:10px; align-items:flex-start;\"><span style=\"width:20px; height:20px; flex:none; border-radius:6px; background:#7B4FE0; color:#fff; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center;\">2<\u002Fspan><span style=\"font-size:12.5px; color:#3A3450; line-height:1.4;\">A IA verifica novas vagas a cada hora automaticamente<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; gap:10px; align-items:flex-start;\"><span style=\"width:20px; height:20px; flex:none; border-radius:6px; background:#7B4FE0; color:#fff; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center;\">3<\u002Fspan><span style=\"font-size:12.5px; color:#3A3450; line-height:1.4;\">Você recebe push e e-mail assim que uma bolsa aparecer<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ════════════ CANDIDATURA PASSO-A-PASSO ════════════ -->\n      <sc-if value=\"{{ candidaturaPassoOn }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Candidatura\" style=\"padding:6px 20px 32px;\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin:2px 0 20px;\">\n          <button onclick=\"{{ goBack }}\" style=\"flex:none; width:40px; height:40px; border:none; border-radius:13px; background:rgba(255,255,255,.6); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); box-shadow:0 4px 14px rgba(75,45,163,.1); display:flex; align-items:center; justify-content:center; cursor:pointer;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#4B2DA3\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n          <h1 style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:600; color:#1B1326; margin:0;\">Candidatura<\u002Fh1>\n        <\u002Fdiv>\n\n        <!-- bolsa resumo -->\n        <div style=\"display:flex; gap:13px; align-items:center; background:rgba(255,255,255,.65); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,.7); border-radius:18px; padding:14px 16px; box-shadow:0 8px 22px rgba(75,45,163,.07); margin-bottom:18px;\">\n          <div style=\"width:46px; height:46px; border-radius:13px; flex:none; background:linear-gradient(135deg,#ECE6FB,#D8CBF6); display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px; color:#4B2DA3;\">{{ selB.sigla }}<\u002Fdiv>\n          <div style=\"flex:1; min-width:0;\">\n            <div style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px; color:#1B1326; line-height:1.2;\">{{ selB.curso }}<\u002Fdiv>\n            <div style=\"font-size:12px; color:#6E6680; margin-top:2px;\">{{ selB.uni }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:right; flex:none;\">\n            <div style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; color:#4B2DA3;\">{{ selB.pct }}<\u002Fdiv>\n            <div style=\"font-size:10px; color:#A89FBA;\">bolsa<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- status geral -->\n        <div style=\"position:relative; border-radius:20px; padding:18px; overflow:hidden; background:linear-gradient(150deg,#5B33B8,#2A1560); box-shadow:0 16px 32px -12px rgba(42,21,96,.5); margin-bottom:20px;\">\n          <div style=\"position:absolute; inset:0; filter:url(#goo); opacity:.7; pointer-events:none;\"><div class=\"goo-blob\" style=\"position:absolute; width:70px; height:70px; border-radius:50%; background:#8A5CF0; top:-18px; right:-8px;\"><\u002Fdiv><div class=\"goo-blob\" style=\"position:absolute; width:52px; height:52px; border-radius:50%; background:#C44DD9; bottom:-16px; left:24px;\"><\u002Fdiv><\u002Fdiv>\n          <div style=\"position:relative; display:flex; align-items:center; gap:16px;\">\n            <div style=\"text-align:center; flex:none;\">\n              <div style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:28px; color:#fff; line-height:1;\">{{ docDone }}<span style=\"font-size:16px; color:rgba(255,255,255,.6);\">/{{ docTotal }}<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:10px; color:rgba(255,255,255,.7); margin-top:3px;\">documentos<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;\">\n              <div style=\"display:flex; justify-content:space-between; margin-bottom:7px;\"><span style=\"font-size:12px; color:rgba(255,255,255,.8);\">Progresso<\u002Fspan><span style=\"font-size:12px; font-weight:600; color:#fff;\">{{ docPct }}<\u002Fspan><\u002Fdiv>\n              <div style=\"position:relative; height:8px; border-radius:999px; background:rgba(255,255,255,.2); overflow:hidden;\"><div style=\"position:absolute; inset:0 auto 0 0; height:100%; width: {{ docPct }}; border-radius:999px; background:linear-gradient(90deg,#EBDBFF,#C44DD9); transition:width .5s cubic-bezier(.22,1,.36,1);\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"font-size:11.5px; color:rgba(255,255,255,.75); margin-top:8px;\">Status: <strong style=\"color:#FFD479;\">Em análise · aguardando docs<\u002Fstrong><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- prazo -->\n        <div style=\"display:flex; align-items:center; gap:10px; background:#FBEEF5; border:1px solid rgba(194,91,160,.22); border-radius:14px; padding:13px 14px; margin-bottom:20px;\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C25BA0\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 2\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-size:13px; font-weight:600; color:#C25BA0;\">Prazo de envio: <strong>{{ selB.prazo }}<\u002Fstrong> — faltam {{ selB.dias }} dias<\u002Fspan>\n        <\u002Fdiv>\n\n        <!-- documentos -->\n        <h2 style=\"font-family:'Space Grotesk',sans-serif; font-size:16px; font-weight:600; color:#1B1326; margin:0 2px 13px;\">Documentos necessários<\u002Fh2>\n        <div style=\"display:flex; flex-direction:column; gap:10px; margin-bottom:24px;\">\n          <sc-for list=\"{{ docItems }}\" as=\"d\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex; align-items:center; gap:13px; background:rgba(255,255,255,.65); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,.65); border-radius:16px; padding:13px 14px; box-shadow:0 5px 14px rgba(75,45,163,.05);\">\n              <span style=\"width:34px; height:34px; flex:none; border-radius:10px; background: {{ d.iconBg }}; display:flex; align-items:center; justify-content:center;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"{{ d.iconPath }}\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <div style=\"flex:1; min-width:0;\">\n                <div style=\"font-size:13.5px; font-weight:600; color:#1B1326;\">{{ d.label }}<\u002Fdiv>\n                <div style=\"font-size:11.5px; color:#6E6680; margin-top:2px;\">{{ d.sub }}<\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"font-size:11px; font-weight:600; color: {{ d.statusColor }}; background: {{ d.statusBg }}; padding:4px 10px; border-radius:8px; white-space:nowrap;\">{{ d.statusLabel }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- IA banner -->\n        <div style=\"display:flex; align-items:center; gap:12px; background:rgba(138,92,240,.1); border:1px solid rgba(138,92,240,.25); border-radius:16px; padding:14px 16px; margin-bottom:24px;\">\n          <div style=\"width:36px; height:36px; flex:none; border-radius:11px; background:linear-gradient(135deg,#7B4FE0,#4B2DA3); display:flex; align-items:center; justify-content:center;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <span style=\"font-size:12.5px; color:#4B2DA3; font-weight:500; line-height:1.4;\">A IA já preencheu <strong>{{ docDone }} de {{ docTotal }}<\u002Fstrong> documentos automaticamente com seu perfil cadastrado.<\u002Fspan>\n        <\u002Fdiv>\n\n        <button onclick=\"{{ goCandidaturaOk }}\" style=\"width:100%; display:flex; align-items:center; justify-content:center; gap:8px; border:none; cursor:pointer; background:linear-gradient(135deg,#6B3FD0,#4B2DA3); color:#fff; font-family:'Sora',sans-serif; font-weight:600; font-size:14.5px; padding:16px; border-radius:17px; box-shadow:0 14px 30px -8px rgba(75,45,163,.5);\" style-active=\"transform:scale(.98)\">Confirmar candidatura<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ════════════ COMPARADOR ════════════ -->\n      <sc-if value=\"{{ comparadorOn }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Comparador\" style=\"padding:6px 20px 32px;\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin:2px 0 6px;\">\n          <button onclick=\"{{ goBack }}\" style=\"flex:none; width:40px; height:40px; border:none; border-radius:13px; background:rgba(255,255,255,.6); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); box-shadow:0 4px 14px rgba(75,45,163,.1); display:flex; align-items:center; justify-content:center; cursor:pointer;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#4B2DA3\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n          <h1 style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:600; color:#1B1326; margin:0;\">Comparar bolsas<\u002Fh1>\n        <\u002Fdiv>\n        <p style=\"font-size:13px; color:#6E6680; margin:0 0 16px 52px; line-height:1.45;\">Selecione até 3 bolsas para comparar.<\u002Fp>\n\n        <!-- picker -->\n        <div style=\"display:flex; gap:8px; overflow-x:auto; margin:0 -20px 20px; padding:0 20px 4px;\">\n          <sc-for list=\"{{ comparPicker }}\" as=\"b\" hint-placeholder-count=\"5\">\n            <button onclick=\"{{ b.toggle }}\" style=\"{{ b.pickSt }}\">{{ b.sigla }} · {{ b.curso }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- grade de comparação -->\n        <div style=\"display:flex; gap:10px; overflow-x:auto; margin:0 -20px; padding:0 20px 8px;\">\n          <sc-for list=\"{{ comparBolsas }}\" as=\"b\" hint-placeholder-count=\"2\">\n            <div style=\"flex:none; width:220px; background:rgba(255,255,255,.68); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,.7); border-radius:22px; padding:18px; box-shadow:0 10px 28px rgba(75,45,163,.1); display:flex; flex-direction:column; gap:14px;\">\n              <!-- header -->\n              <div style=\"display:flex; flex-direction:column; gap:4px;\">\n                <div style=\"width:42px; height:42px; border-radius:12px; background:linear-gradient(135deg,#ECE6FB,#D8CBF6); display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px; color:#4B2DA3; margin-bottom:4px;\">{{ b.sigla }}<\u002Fdiv>\n                <div style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px; color:#1B1326; line-height:1.2;\">{{ b.curso }}<\u002Fdiv>\n                <div style=\"font-size:11.5px; color:#6E6680;\">{{ b.uni }}<\u002Fdiv>\n              <\u002Fdiv>\n              <!-- metrica: chance -->\n              <div>\n                <div style=\"font-size:10.5px; font-weight:600; letter-spacing:.4px; text-transform:uppercase; color:#A89FBA; margin-bottom:7px;\">Sua chance<\u002Fdiv>\n                <div style=\"display:flex; align-items:baseline; gap:5px; margin-bottom:7px;\"><span style=\"font-family:'Space Grotesk',sans-serif; font-s ition:relative; height:7px; border-radius:999px; background:#EDE8F7; overflow:hidden;\"><div style=\"position:absolute; inset:0 auto 0 0; height:100%; width: {{ b.simWidth }}; border-radius:999px; background: {{ b.simGrad }}; transition:width .4s cubic-bezier(.22,1,.36,1);\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ════════════ VOCACIONAL → BOLSAS ════════════ -->\n      <sc-if value=\"{{ vocacionalBolsasOn }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Bolsas Vocacional\" style=\"padding:6px 20px 32px;\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin:2px 0 18px;\">\n          <button onclick=\"{{ goBack }}\" style=\"flex:none; width:40px; height:40px; border:none; border-radius:13px; background:rgba(255,255,255,.6); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); box-shadow:0 4px 14px rgba(75,45,163,.1); display:flex; align-items:center; justify-content:center; cursor:pointer;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#4B2DA3\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n          <h1 style=\"font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:600; color:#1B1326; margin:0;\">Bolsas do seu perfil<\u002Fh1>\n        <\u002Fdiv>\n\n        <!-- perfil badge -->\n        <div style=\"position:relative; border-radius:22px; padding:18px 20px; overflow:hidden; background:linear-gradient(150deg,#5B33B8,#2A1560); box-shadow:0 18px 36px -12px rgba(42,21,96,.55); margin-bottom:20px;\">\n          <div style=\"position:absolute; inset:0; filter:url(#goo); opacity:.75; pointer-events:none;\"><div class=\"goo-blob\" style=\"position:absolute; width:80px; height:80px; border-radius:50%; background:#8A5CF0; top:-20px; right:-10px;\"><\u002Fdiv><div class=\"goo-blob\" style=\"position:absolute; width:60px; height:60px; border-radius:50%; background:#C44DD9; bottom:-16px; left:24px;\"><\u002Fdiv><\u002Fdiv>\n          <div style=\"position:relative; display:flex; align-items:center; gap:14px;\">\n            <div style=\"width:48px; height:48px; flex:none; border-radius:15px; background:rgba(255,255,255,.16); display:flex; align-items:center; justify-content:center;\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1V18h6v-1.2c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div><div style=\"font-size:10.5px; font-weight:600; letter-spacing:.6px; text-transform:uppercase; color:#D9C7F8;\">Seu perfil vocacional<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:600; color:#fff; line-height:1.2; margin-top:4px;\">Investigativo &amp; Criativo<\u002Fdiv><div style=\"font-size:12px; color:rgba(255,255,255,.75); margin-top:4px;\">{{ bolsasCount }} bolsas compatíveis com UX / Design / Arquitetura<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- bolsas filtradas pelo perfil -->\n        <div style=\"display:flex; flex-direction:column; gap:13px;\">\n          <sc-for list=\"{{ bolsas }}\" as=\"b\" hint-placeholder-count=\"5\">\n            <div onclick=\"{{ b.open }}\" style=\"cursor:pointer; background:rgba(255,255,255,.65); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,.68); border-radius:20px; padding:15px 16px; box-shadow:0 8px 22px rgba(75,45,163,.09); animation:pop .35s ease both;\" style-active=\"transform:scale(.99)\">\n              <div style=\"display:flex; gap:12px; align-items:flex-start;\">\n                <div style=\"width:44px; height:44px; border-radius:13px; flex:none; background:linear-gradient(135deg,#ECE6FB,#D8CBF6); display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px; color:#4B2DA3;\">{{ b.sigla }}<\u002Fdiv>\n                <div style=\"flex:1; min-width:0;\">\n                  <div style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14.5px; color:#1B1326; line-height:1.2;\">{{ b.curso }}<\u002Fdiv>\n                  <div style=\"font-size:12px; color:#6E6680; margin-top:2px;\">{{ b.uni }}<\u002Fdiv>\n                <\u002Fdiv>\n                <span style=\"{{ b.pctPill }}\">{{ b.pct }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-top:12px;\">\n                <span style=\"font-size:12px; color:#6E6680; font-weight:500;\">Chance<\u002Fspan>\n                <span style=\"font-family:'Space Grotesk',sans-serif; font-size:14px; font-weight:700; color: {{ b.chanceColor }};\">{{ b.chance }} · {{ b.val }}%<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"position:relative; height:7px; border-radius:999px; background:#EDE8F7; overflow:hidden; margin-top:7px;\"><div style=\"position:absolute; inset:0 auto 0 0; height:100%; width: {{ b.width }}; border-radius:999px; background: {{ b.grad }};\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <!-- bottom nav -->\n    <sc-if value=\"{{ showNav }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"position:absolute; left:0; right:0; bottom:0; z-index:35; padding:10px 16px 26px; background:rgba(244,241,251,.88); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-top:1px solid rgba(75,45,163,.08); display:flex; justify-content:space-between;\">\n      <button onclick=\"{{ goInicio }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; border:none; background:transparent; cursor:pointer; padding:6px 0;\">\n        <div style=\"color: {{ cInicio }}; display:flex; flex-direction:column; align-items:center; gap:4px;\"><svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 10.5 12 3l9 7.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z\"><\u002Fpath><\u002Fsvg><span style=\"font-size:10px; font-weight:600;\">Início<\u002Fspan><\u002Fdiv>\n      <\u002Fbutton>\n      <button onclick=\"{{ goBolsas }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; border:none; background:transparent; cursor:pointer; padding:6px 0;\">\n        <div style=\"color: {{ cBolsas }}; display:flex; flex-direction:column; align-items:center; gap:4px;\"><svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"m21 21-4.3-4.3\"><\u002Fpath><\u002Fsvg><span style=\"font-size:10px; font-weight:600;\">Bolsas<\u002Fspan><\u002Fdiv>\n      <\u002Fbutton>\n      <button onclick=\"{{ goEventos }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; border:none; background:transparent; cursor:pointer; padding:6px 0;\">\n        <div style=\"color: {{ cEventos }}; display:flex; flex-direction:column; align-items:center; gap:4px;\"><svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"17\" rx=\"3\"><\u002Frect><path d=\"M3 9h18M8 2v4M16 2v4\"><\u002Fpath><\u002Fsvg><span style=\"font-size:10px; font-weight:600;\">Eventos<\u002Fspan><\u002Fdiv>\n      <\u002Fbutton>\n      <button onclick=\"{{ goHistorico }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; border:none; background:transparent; cursor:pointer; padding:6px 0;\">\n        <div style=\"color: {{ cHistorico }}; display:flex; flex-direction:column; align-items:center; gap:4px;\"><svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg><span style=\"font-size:10px; font-weight:600;\">Histórico<\u002Fspan><\u002Fdiv>\n      <\u002Fbutton>\n      <button onclick=\"{{ goPerfilTela }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; border:none; background:transparent; cursor:pointer; padding:6px 0;\">\n        <div style=\"color: {{ cPerfil }}; display:flex; flex-direction:column; align-items:center; gap:4px;\"><svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"8\" r=\"4\"><\u002Fcircle><path d=\"M4 21a8 8 0 0 1 16 0\"><\u002Fpath><\u002Fsvg><span style=\"font-size:10px; font-weight:600;\">Perfil<\u002Fspan><\u002Fdiv>\n      <\u002Fbutton>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- home indicator -->\n    <div style=\"position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:130px; height:5px; border-radius:99px; background:rgba(27,19,38,.28); z-index:45; pointer-events:none;\"><\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    tab: 'onboarding', obStep: 0, nome: '',\n    prev: [], filtros: { ingresso: false, modal: false, pct: false },\n    qIndex: 0, ctx: { renda: '2-3', enem: '650-720', escola: 'publica' },\n    selBolsa: null, selEvento: null,\n    toggles: { push: true, resumo: true, email: false, lembrete: true },\n    simEnem: 650,\n    comparSel: ['AM', 'PUC'],\n    vestIdx: 0, vestAnswers: [],\n    custoTransporte: 300, custoMoradia: false, custoAlimentacao: 500,\n    comunidadeTab: 'historias',\n    buscaFiltro: { programa: 'todos', pct: 0, estado: 'todos', nota: 0 },\n    perfilEdit: false,\n    cotaSel: { publica: false, racial: false, pcd: false, baixaRenda: false, indigena: false, professor: false },\n    notaCorteSel: 'AM',\n    fiesMensalidade: 1200, fiesSemestres: 8, fiesRenda: 2500,\n    faqAberta: null,\n    entrevistaStep: 0,\n    entrevistaResp: {},\n    vocStep: 0, vocResps: [],\n    declNome: '', declCpf: '', declEndereco: '', declOcupacao: '', declRenda: '', declFamilia: '1',\n    checklistStep: 0, alertasAtivos: { AM: false, FAM: false, PUC: false, UNS: false, EST: false },\n    compA: 'AM', compB: 'FAM',\n    entrevistaIdx: 0,\n    docStatus: { rg: 'ai', cpf: 'ai', historico: 'pending', enem: 'ai', renda: 'pending' },\n    alertaItems: [\n      { id: 0, curso: 'Design Gráfico', cidade: 'São Paulo', minPct: 50, ativo: true  },\n      { id: 1, curso: 'Arquitetura',    cidade: 'Qualquer',  minPct: 75, ativo: false },\n    ],\n    chat: [ { who: 'ai', text: 'Oi, Marina! Sou a Etapa, sua mentora de carreira. Quer que eu compare dois cursos ou busque bolsas pra você?' } ],\n  };\n\n  scrollTop() { const el = this.base && this.base.querySelector('[data-scroll]'); if (el) el.scrollTop = 0; }\n  go(t) { return () => { this.setState(s => ({ prev: [...s.prev, s.tab].slice(-10), tab: t })); this.scrollTop(); }; }\n  nav(t, extra) { return () => { this.setState(s => ({ ...(extra || {}), prev: [...s.prev, s.tab].slice(-10), tab: t })); this.scrollTop(); }; }\n  goBack = () => { this.setState(s => { const p = [...s.prev]; const t = p.pop() || 'inicio'; return { prev: p, tab: t }; }); this.scrollTop(); };\n  obNext = () => { this.setState(s => ({ obStep: s.obStep + 1 })); this.scrollTop(); };\n  obPrev = () => { this.setState(s => ({ obStep: Math.max(0, s.obStep - 1) })); this.scrollTop(); };\n  obSkip = () => { this.setState({ tab: 'inicio', obStep: 0 }); this.scrollTop(); };\n  obNomeChange = (e) => { const v = e.target.value; this.setState({ nome: v }); };\n  obFinish = () => {\n    this.setState({ obStep: 5 }); this.scrollTop();\n    clearTimeout(this._ob);\n    this._ob = setTimeout(() => { this.setState({ tab: 'inicio', obStep: 0 }); this.scrollTop(); }, 2600);\n  };\n  toggle(k) { return () => this.setState(s => ({ filtros: { ...s.filtros, [k]: !s.filtros[k] } })); }\n  ctxSet(k, v) { return () => this.setState(s => ({ ctx: { ...s.ctx, [k]: v } })); }\n  flip(k) { return () => this.setState(s => ({ toggles: { ...s.toggles, [k]: !s.toggles[k] } })); }\n  simSlide = (e) => { this.setState({ simEnem: parseInt(e.target.value) }); };\n  toggleCompar = (sigla) => () => { const cur = this.state.comparSel; const next = cur.includes(sigla) ? cur.filter(x => x !== sigla) : [...cur, sigla].slice(-3); this.setState({ comparSel: next.length ? next : cur }); };\n  setDoc = (k, v) => () => this.setState(s => ({ docStatus: { ...s.docStatus, [k]: v } }));\n  toggleAlerta = (i) => () => this.setState(s => {\n    const arr = [...s.alertaItems]; arr[i] = { ...arr[i], ativo: !arr[i].ativo }; return { alertaItems: arr };\n  });\n  answerVest = (i) => () => {\n    this.setState(s => {\n      const answers = [...s.vestAnswers, i];\n      const next = s.vestIdx + 1;\n      if (next >= this.VEST_Q.length) {\n        return { vestAnswers: answers, vestIdx: 0, prev: [...s.prev, 'vestibular'].slice(-10), tab: 'vestResult' };\n      }\n      return { vestAnswers: answers, vestIdx: next };\n    }); this.scrollTop();\n  };\n  resetVest = () => { this.setState({ vestIdx: 0, vestAnswers: [] }); this.scrollTop(); };\n  setCustoTransporte = (e) => { this.setState({ custoTransporte: parseInt(e.target.value) || 0 }); };\n  setCustoAlimentacao = (e) => { this.setState({ custoAlimentacao: parseInt(e.target.value) || 0 }); };\n  toggleMoradia = () => { this.setState(s => ({ custoMoradia: !s.custoMoradia })); };\n  setComunidadeTab = (t) => () => { this.setState({ comunidadeTab: t }); };\n  setBuscaProg  = (v) => () => this.setState(s => ({ buscaFiltro: { ...s.buscaFiltro, programa: v } }));\n  setBuscaEst   = (v) => () => this.setState(s => ({ buscaFiltro: { ...s.buscaFiltro, estado: v } }));\n  setBuscaPct   = (e) => this.setState(s => ({ buscaFiltro: { ...s.buscaFiltro, pct: parseInt(e.target.value)||0 } }));\n  setBuscaNota  = (e) => this.setState(s => ({ buscaFiltro: { ...s.buscaFiltro, nota: parseInt(e.target.value)||0 } }));\n  toggleAlertaVaga  = (k) => () => this.setState(s => ({ alertasAtivos: { ...s.alertasAtivos, [k]: !s.alertasAtivos[k] } }));\n  setCompA      = (v) => () => this.setState({ compA: v });\n  setCompB      = (v) => () => this.setState({ compB: v });\n  checklistNext = () => this.setState(s => ({ checklistStep: Math.min(s.checklistStep+1,6) }));\n  checklistReset= () => this.setState({ checklistStep: 0 });\n  printDecl     = () => window.print();\n  togglePerfilEdit = () => this.setState(s => ({ perfilEdit: !s.perfilEdit }));\n  toggleCota = (k) => () => this.setState(s => ({ cotaSel: { ...s.cotaSel, [k]: !s.cotaSel[k] } }));\n  setNotaCorte = (sig) => () => this.setState({ notaCorteSel: sig });\n  setFiesMens = (e) => this.setState({ fiesMensalidade: parseInt(e.target.value) || 0 });\n  setFiesSem = (e) => this.setState({ fiesSemestres: parseInt(e.target.value) || 0 });\n  setFiesRenda = (e) => this.setState({ fiesRenda: parseInt(e.target.value) || 0 });\n  toggleFaq = (i) => () => this.setState(s => ({ faqAberta: s.faqAberta === i ? null : i }));\n  vocEscolher = (val) => () => { const r=[...this.state.vocResps,val]; this.setState({vocResps:r,vocStep:this.state.vocStep+1}); };\n  vocReset = () => this.setState({vocStep:0,vocResps:[]});\n  setDecl = (f) => (e) => this.setState({[f]:e.target.value});\n  entrevistaNext = () => this.setState(s => ({ entrevistaStep: Math.min(s.entrevistaStep + 1, 4) }));\n  entrevistaPrev = () => this.setState(s => ({ entrevistaStep: Math.max(s.entrevistaStep - 1, 0) }));\n  entrevistaReset = () => this.setState({ entrevistaStep: 0 });\n\n  // vocacional\n  vocEscolher = (val) => () => {\n    const resps = [...this.state.vocResps, val];\n    this.setState({ vocResps: resps, vocStep: this.state.vocStep + 1 });\n  };\n  vocReset = () => this.setState({ vocStep: 0, vocResps: [] });\n\n  // declaração\n  setDecl = (field) => (e) => this.setState({ [field]: e.target.value });\n  entrevistaNext = () => this.setState(s => ({ entrevistaIdx: Math.min(s.entrevistaIdx + 1, 4) }));\n  entrevistaPrev = () => this.setState(s => ({ entrevistaIdx: Math.max(s.entrevistaIdx - 1, 0) }));\n  get VEST_Q() {\n    return [\n      { area:'Linguagens',        q:'Qual recurso predomina em \"A vida é uma batalha que temos de perder\"?', opts:['Metáfora','Ironia','Metonímia','Hipérbole'] },\n      { area:'Matemática',        q:'Se 2x + 4 = 12, qual o valor de x²?', opts:['16','4','8','12'] },\n      { area:'Ciências Humanas',  q:'A industrialização brasileira foi intensificada principalmente no governo de:', opts:['Getúlio Vargas','Juscelino Kubitschek','Fernando Henrique','Lula'] },\n      { area:'Ciências da Natureza', q:'Quais substâncias são produzidas na fotossíntese?', opts:['Glicose e O₂','CO₂ e H₂O','ATP e CO₂','Proteínas'] },\n      { area:'Redação',           q:'No texto dissertativo-argumentativo, a tese deve aparecer:', opts:['Na introdução','Na conclusão','Em todo parágrafo','Só no desenvolvimento'] },\n    ];\n  }\n  sendChat(t) { return () => { this.setState(s => ({ chat: [...s.chat, { who: 'me', text: t }, { who: 'ai', text: this.aiReply(t) }] })); }; }\n  aiReply(t) {\n    if (/bolsa/i.test(t)) return 'Encontrei 5 bolsas alinhadas ao seu perfil Investigativo. A de Design Gráfico na Anhembi tem 88% de chance pra você. Quer ver os requisitos?';\n    if (/compar/i.test(t)) return 'Arquitetura tem régua salarial maior no topo, mas Design entra mais rápido no mercado. Posso abrir o relatório lado a lado?';\n    if (/evento|visita|portas/i.test(t)) return 'Tem Portas Abertas na USP dia 28/06 com 32 vagas. Quer que eu garanta a sua?';\n    return 'Boa! Já anotei isso no seu mapa. Posso sugerir os próximos passos quando quiser.';\n  }\n  answerQuiz(i) {\n    return () => this.setState(s => {\n      const next = s.qIndex + 1;\n      if (next >= this.QUESTIONS.length) {\n        clearTimeout(this._qt);\n        this._qt = setTimeout(() => this.setState({ tab: 'relatorio' }), 2800);\n        return { qIndex: 0, prev: [...s.prev, 'teste'].slice(-10), tab: 'processando' };\n      }\n      return { qIndex: next };\n    });\n  }\n  get QUESTIONS() {\n    return [\n      { q: 'O que mais te empolga num projeto novo?', opts: ['Investigar e entender a fundo', 'Criar algo visual e original', 'Organizar e liderar pessoas', 'Ajudar alguém diretamente'] },\n      { q: 'No seu tempo livre, você prefere…', opts: ['Resolver enigmas e quebra-cabeças', 'Desenhar, escrever ou editar', 'Empreender uma ideia', 'Ouvir e aconselhar amigos'] },\n      { q: 'Qual elogio mais combina com você?', opts: ['\"Que raciocínio afiado!\"', '\"Que criatividade!\"', '\"Que liderança!\"', '\"Que empatia!\"'] },\n      { q: 'Seu trabalho dos sonhos teria…', opts: ['Dados e descobertas', 'Liberdade pra criar', 'Metas e resultados', 'Impacto na vida das pessoas'] },\n      { q: 'Diante de um problema difícil, você…', opts: ['Pesquisa antes de agir', 'Imagina soluções fora da caixa', 'Monta um plano e executa', 'Reúne o time pra decidir junto'] },\n    ];\n  }\n\n  componentDidMount() { this._lastTab = this.state.tab; this.runAnims(); }\n  componentDidUpdate() { if (this._lastTab !== this.state.tab) { this._lastTab = this.state.tab; this.runAnims(); } }\n  componentWillUnmount() { clearTimeout(this._t); clearTimeout(this._qt); clearTimeout(this._ob); }\n\n  runAnims() {\n    const g = window.gsap;\n    if (!g) { this._t = setTimeout(() => this.runAnims(), 120); return; }\n
