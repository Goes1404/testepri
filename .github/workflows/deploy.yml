name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  audit-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Verify Frontend (index.html, JavaScript formatting)
      - name: Validate Frontend HTML/JS
        run: |
          echo "Validating frontend files structure..."
          test -f portal/index.html
          test -f portal/app1.js
          test -f portal/app2.js

      # Verify Backend (if dependencies are committed or package.json exists)
      - name: Setup Node.js (for backend checks)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci || npm install

      - name: Run Backend Syntax Verification
        working-directory: ./backend
        run: node --check index.js

  deploy-frontend:
    needs: audit-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Vercel Deployment Trigger (using Vercel Action or CLI)
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./portal

  deploy-backend:
    needs: audit-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Railway Deployment Trigger
      - name: Deploy to Railway
        run: |
          npm install -g @railway/cli
          railway up --service portal-aluno-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
